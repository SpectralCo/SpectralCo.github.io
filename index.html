<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpectralCo — Independent Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1f38;
      --teal: #2a9d8f;
      --light: #f8f7f4;
      --mid: #8a8a8a;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--light);
      color: var(--navy);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .wordmark {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 0.3rem;
    }

    .wordmark span {
      color: var(--teal);
    }

    .rule {
      width: 48px;
      height: 1px;
      background: var(--teal);
      margin: 1.6rem auto;
      opacity: 0.6;
    }

    .headline {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 300;
      letter-spacing: 0.02em;
      line-height: 1.2;
      color: var(--navy);
      margin-bottom: 1.2rem;
    }

    .subtext {
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--mid);
      letter-spacing: 0.04em;
      line-height: 1.7;
      max-width: 360px;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      font-family: var(--sans);
      font-size: 0.72rem;
      color: var(--mid);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="wordmark">Spectral<span>Co</span></div>

  <div class="rule"></div>

  <h1 class="headline">Site under maintenance</h1>

  <p class="subtext">
    We're currently updating the site.<br>
    Please check back soon.
  </p>

  <p class="footer">© 2026 SpectralCo. All rights reserved.</p>

</body>
</html>
